<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Iniciar Sesión - Control Banquete</title>
  <script src="js/i18n.js" defer></script>
  <link rel="manifest" href="manifest.json">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registered successfully:', reg.scope))
          .catch(err => console.error('Service Worker registration failed:', err));
      });
    }
  </script>
  <meta name="description" content="Portal de inicio de sesión de Control Banquete para clientes, administradores y personal.">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }
    .brand-header {
      margin-bottom: 2rem;
      text-align: center;
    }
    .brand-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.5rem;
    }
    .brand-title {
      font-family: var(--font-title);
      color: var(--accent-gold);
      font-size: 1.8rem;
      letter-spacing: 2px;
      font-weight: 700;
    }
    .error-alert {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>

  <div class="brand-header">
    <div class="brand-logo">
      <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#d4af37" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 3h12l-1 9a5 5 0 0 1-10 0L6 3Z"/>
        <path d="M12 17v4"/>
        <path d="M8 21h8"/>
        <path d="M12 6V3"/>
        <circle cx="12" cy="9" r="1"/>
      </svg>
    </div>
    <div class="brand-title" id="brand-text">CONTROL BANQUETE</div>
  </div>

  <div class="login-view-container" style="min-height: auto;">
    <div class="card login-card" style="margin-top: 0;">
      <h2 style="font-family: var(--font-title); color: var(--accent-gold); text-align: center; margin-bottom: 2rem; font-size: 1.6rem;">Acceso al Portal</h2>
      
      <div class="error-alert" id="error-box"></div>

      <form id="form-login">
        <div class="form-group" style="margin-bottom: 1.2rem;">
          <label for="login-email">Correo Electrónico</label>
          <input type="email" id="login-email" placeholder="correo@ejemplo.com" required style="width: 100%; box-sizing: border-box; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-primary); font-family: inherit;">
        </div>
        <div class="form-group" style="margin-bottom: 0.75rem;">
          <label for="login-password">Contraseña</label>
          <div style="position: relative; display: flex; align-items: center;">
            <input type="password" id="login-password" placeholder="••••••••" required style="width: 100%; box-sizing: border-box; padding: 0.75rem 2.5rem 0.75rem 0.75rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-primary); font-family: inherit;">
            <span id="toggle-password-eye" style="position: absolute; right: 12px; cursor: pointer; user-select: none; font-size: 1.1rem; color: var(--text-secondary);">👁️</span>
          </div>
        </div>
        <div style="text-align: right; margin-bottom: 1.5rem;">
          <a href="#" id="link-forgot-password" style="font-size: 0.8rem; color: var(--text-secondary); text-decoration: none;">¿Olvidaste tu contraseña?</a>
        </div>
        <button type="submit" class="btn-primary" id="btn-login-submit" style="width: 100%; height: 46px;">Ingresar</button>
      </form>
      
      <div class="demo-credentials" id="demo-auth-selector" style="display: none;">
        <h4 style="font-size: 0.85rem; color: var(--accent-gold); margin-bottom: 0.5rem;">Acceso Rápido Simulador (Demo)</h4>
        <p style="font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.8rem;">Selecciona una cuenta de prueba (contraseña: <strong>123456</strong>).</p>
        <select id="select-demo-user" style="width: 100%; box-sizing: border-box; padding: 0.5rem; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-primary); font-family: inherit; font-size: 0.85rem;">
          <option value="">-- Selecciona un Rol --</option>
          <option value="admin@controlbanquete.com">Superadministrador (Control Total)</option>
          <option value="compras@controlbanquete.com">Compras (Abastecimiento)</option>
          <option value="cocina@controlbanquete.com">Cocina (Recetas y Producción)</option>
          <option value="logistica@controlbanquete.com">Logística (Coordinación)</option>
          <option value="decoracion@controlbanquete.com">Decoración (Montajes)</option>
          <option value="recreacion@controlbanquete.com">Recreación (Asignaciones)</option>
          <option value="cliente@controlbanquete.com">Portal Cliente (Sara y Felipe)</option>
        </select>
      </div>
      
      <button class="btn-secondary" id="btn-back-cotizar" style="width: 100%; margin-top: 1.5rem; height: 40px;">Ir al Cotizador Público</button>
      <div style="text-align:center; margin-top: 1.25rem;">
        <span style="font-size: 0.85rem; color: var(--text-secondary);">¿No tienes cuenta? </span>
        <a href="register.html" style="font-size: 0.85rem; color: var(--accent-gold); font-weight: 600; text-decoration: none;">Crear cuenta gratis →</a>
      </div>
    </div>
  </div>

  <script>
    // ────────── 1. Si ya hay sesión activa, ir al panel ──────────
    const cachedUser = localStorage.getItem('controlbanquete_current_user');
    const cachedToken = localStorage.getItem('controlbanquete_token');
    if (cachedUser && cachedToken) {
      window.location.href = 'index.html';
    }

    // ────────── 2. Parámetro ?demo=true en la URL ──────────
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('demo')) {
      localStorage.setItem('controlbanquete_force_mock', urlParams.get('demo') === 'true' ? 'true' : 'false');
    }
    if (localStorage.getItem('controlbanquete_force_mock') === 'true') {
      document.getElementById('demo-auth-selector').style.display = 'block';
    }

    // ────────── 3. Demo: selección automática de usuario ──────────
    document.getElementById('select-demo-user').addEventListener('change', function() {
      if (this.value) {
        document.getElementById('login-email').value = this.value;
        document.getElementById('login-password').value = '123456';
        document.getElementById('btn-login-submit').click();
      }
    });

    // ────────── 4. Envío del formulario ──────────
    document.getElementById('form-login').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errorBox = document.getElementById('error-box');
      const btnSubmit = document.getElementById('btn-login-submit');

      errorBox.style.display = 'none';
      btnSubmit.disabled = true;
      btnSubmit.textContent = 'Ingresando...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Credenciales inválidas');
        }

        localStorage.setItem('controlbanquete_current_user', JSON.stringify(data.user));
        localStorage.setItem('controlbanquete_token', data.token);
        window.location.href = 'index.html';

      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = 'block';
        btnSubmit.disabled = false;
        btnSubmit.textContent = 'Ingresar';
      }
    });

    // ────────── 5. Botón volver al cotizador ──────────
    document.getElementById('btn-back-cotizar').addEventListener('click', function() {
      window.location.href = 'index.html';
    });

    // ────────── 6. Tema y nombre de empresa desde servidor ──────────
    (async function loadTheme() {
      const savedTheme = localStorage.getItem('controlbanquete_theme') || 'dark';
      if (savedTheme === 'light') document.body.classList.add('light-theme');
      try {
        const res = await fetch('/api/settings');
        if (!res.ok) return;
        const settings = await res.json();
        if (settings.businessName) {
          document.getElementById('brand-text').textContent = settings.businessName.toUpperCase();
        }
      } catch(e) { /* sin conexión, usar valores por defecto */ }
    })();

    // Ojito para mostrar/ocultar contraseña
    document.getElementById('toggle-password-eye').addEventListener('click', function() {
      const passwordInput = document.getElementById('login-password');
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        this.textContent = '🙈';
      } else {
        passwordInput.type = 'password';
        this.textContent = '👁️';
      }
    });

    // Recuperar contraseña
    document.getElementById('link-forgot-password').addEventListener('click', function(e) {
      e.preventDefault();
      alert(
        `🔑 RECUPERACIÓN DE CONTRASEÑA\n\n` +
        `Para recuperar o restablecer tu contraseña, envía un correo desde tu dirección registrada a soporte@controlbanquete.app con el asunto "Recuperar Contraseña", o ponte en contacto con el administrador de tu cuenta.`
      );
    });
  </script>
</body>
</html>
